# Markdown-it config
## Docs: https://github.com/celsomiranda/hexo-renderer-markdown-it/wiki/
markdown:
  render:
    html: true
    xhtmlOut: false
    breaks: false
    linkify: true
    typographer: true
    quotes: '“”‘’'
  anchors:
    # Minimum level for ID creation. (Ex. h2 to h6)
    level: 2
    # A suffix that is prepended to the number given if the ID is repeated.
    collisionSuffix: 'v'           
    # If `true`, creates an anchor tag with a permalink besides the heading.
    permalink: false              
    # Class used for the permalink anchor tag.
    permalinkClass: header-anchor 
    # The symbol used to make the permalink
    permalinkSymbol: ¶
  plugins:
    - markdown-it-abbr
    - markdown-it-footnote
    - markdown-it-ins
    - markdown-it-emoji
    - '@iktakahiro/markdown-it-katex'
    - markdown-it-task-checkbox


# abbrlink config
abbrlink:
  alg: crc32  #算法选项：crc16、crc32，区别见之前的文章，这里默认为crc16
  rep: hex    #输出进制：十进制和十六进制，默认为10进制。
  
# add caption for iamges # need fancybox
image_caption:
  enable: true #false to disable
  class_name: #if you wanna customize the style for the caption,you can assign a class name, default is 'image-caption'

# hexo-tag-cloud
tag_cloud:
    textFont: 'Trebuchet MS, Helvetica'
    textColor: '#333'
    textHeight: 12
    outlineColor: '#FFFFFF'  #'#E2E1D1'
    maxSpeed: 0.05 # range from [0.01 ~ 1]
