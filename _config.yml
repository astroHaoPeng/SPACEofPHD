# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Space Research Blog
subtitle: We Do Space Research.
description: SPACE.of.PHD
keywords: #Astrodynamics, Space Research, Technology, 
author: Hao Peng
language: en #zh-CN
timezone: America/New_York

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://SpaceResearch.top/blog #SPACEofPHD
root: /blog/
permalink: :abbrlink/ #-:year:month:day/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  hljs: true # 添加这一行！
  line_number: true
  auto_detect: false
  tab_replace:
  
# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: '' # could change to '/new-updates' and add a custom index.md at /_posts/ 
  per_page: 10
  order_by: -updated

archive_generator:
  per_page: 50
  yearly: true
  monthly: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
plugin: 
  # - hexo-render-markded
## Themes: https://hexo.io/themes/
theme: next

# Hexo localsearch
search:
  path: search.xml
  field: post
  content: true

# Hexo generator feed
# feed:
#   type: atom
#   path: atom.xml
#   limit: 20
#   hub:
#   content:
#   content_limit: 140
#   content_limit_delim: ' '

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: 
    #github: git@github.com:AstroH-Peng/blog.git,gh-pages
    vultr: git@45.63.5.49:/home/git/hexo.git/,master


# https://github.com/theme-next/hexo-symbols-count-time
symbols_count_time:
  symbols: false
  time: false
  total_symbols: true
  total_time: true


math: 
  engine: 'katex' # 'mathjax' # or 'katex'
  mathjax: 
    src: #custom_mathjax_source
    Macros: 
      bm: "\\boldsymbol"
  katex:
    css: custom_css_source
    js: custom_js_source # not used
    config:
      # KaTeX config

# kramed: # this is used with 'mathjax'
#   gfm: true
#   pedantic: false
#   sanitize: false
#   tables: true
#   breaks: true
#   smartLists: true
#   smartypants: true

# markdown_it_plus: # this is used with 'katex'
